<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>crux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    html, body { height: 100%; }
    #app { height: 100vh; }
    @keyframes crux-spin { to { transform: rotate(360deg); } }
    .crux-spin { animation: crux-spin 1s linear infinite; display: inline-block; }
    @media (prefers-reduced-motion: reduce) { .crux-spin { animation: none; } }
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: var(--radius-pill); border: 3px solid var(--bg); }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script type="text/babel" src="/static/js/cases.js"></script>
  <script type="text/babel" src="/static/js/verdicts.js"></script>
  <script type="text/babel" src="/static/js/shell.js"></script>
</body>
</html>
