<!-- @dsCard group="crux" viewport="1180x720" name="crux — Cases workspace" subtitle="Two-pane research console: cases, bake-off, probes, verdicts" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>crux</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.7.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="../../styles.css">
<style>
  html, body { height: 100%; }
  #app { height: 100vh; }
  @keyframes crux-spin { to { transform: rotate(360deg); } }
  .crux-spin { animation: crux-spin 1s linear infinite; display: inline-block; }
  @media (prefers-reduced-motion: reduce) { .crux-spin { animation: none; } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; border: 3px solid var(--bg); }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script src="data.js"></script>
  <script type="text/babel" src="Shell.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel">
    function App() {
      const [theme, setTheme] = React.useState('light');
      const [route, setRoute] = React.useState('cases');
      const [caseId, setCaseId] = React.useState(null);
      const [modal, setModal] = React.useState(false);

      React.useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
      const toggleTheme = () => setTheme((t) => (t === 'dark' ? 'light' : 'dark'));

      const data = window.CRUX_DATA;
      const counts = {
        cases: data.cases.filter((c) => !c.verdictLog).length,
        probes: data.cases.filter((c) => c.probe && c.probe.status === 'running').length,
        verdicts: data.cases.filter((c) => c.verdictLog).length,
      };
      const openCase = (id) => { setCaseId(id); setRoute('case'); };

      let main;
      if (route === 'case') {
        main = <CaseScreen caseId={caseId} onBack={() => setRoute('cases')} onLogVerdict={() => alert('Verdict logged. Action plan unlocked.')} theme={theme} onToggleTheme={toggleTheme} />;
      } else if (route === 'verdicts') {
        main = <VerdictScreen onOpen={openCase} theme={theme} onToggleTheme={toggleTheme} />;
      } else {
        main = <CasesScreen onOpen={openCase} onNew={() => setModal(true)} theme={theme} onToggleTheme={toggleTheme} />;
      }

      const showRail = route !== 'case';

      return (
        <div style={{ display: 'flex', height: '100%', background: 'var(--bg)' }}>
          <Sidebar route={route} setRoute={setRoute} counts={counts} />
          <main style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>{main}</main>
          {showRail && <RightRail onNew={() => setModal(true)} onOpen={openCase} />}
          {modal && <NewCaseModal onClose={() => setModal(false)} onCreate={() => { setModal(false); openCase('CASE-0148'); }} />}
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
